name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript (${{ matrix.app }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [web, api]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check — ${{ matrix.app }}
        run: pnpm --filter @logiqo/${{ matrix.app }} typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        run: pnpm --filter @logiqo/web lint

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: apps/web
        run: pnpm build
        env:
          AUTH0_SECRET: ""
          NEXT_PUBLIC_API_URL: "http://localhost:8080"
          AUTH0_BASE_URL: "http://localhost:3000"
          AUTH0_ISSUER_BASE_URL: "https://placeholder.auth0.com"
          AUTH0_CLIENT_ID: "placeholder"
          AUTH0_CLIENT_SECRET: "placeholder"
          AUTH0_AUDIENCE: "https://api.logiqo.io"
