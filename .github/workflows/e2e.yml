name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same PR/branch to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (${{ matrix.shard }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    steps:
      # ── Checkout & pnpm setup ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build the Next.js app ─────────────────────────────────────────────
      # We build first so the webServer in playwright.config.ts can use `next start`
      # instead of the slower `next dev`.
      - name: Build Next.js app
        working-directory: apps/web
        run: pnpm build
        env:
          # Auth0 must be empty so dev-mode bypass activates
          AUTH0_SECRET: ""
          NEXT_PUBLIC_API_URL: "http://localhost:8080"
          # Skip actual Auth0 initialisation during build
          AUTH0_BASE_URL: "http://localhost:3000"
          AUTH0_ISSUER_BASE_URL: "https://placeholder.auth0.com"
          AUTH0_CLIENT_ID: "placeholder"
          AUTH0_CLIENT_SECRET: "placeholder"
          AUTH0_AUDIENCE: "https://api.logiqo.io"

      # ── Install Playwright browsers ────────────────────────────────────────
      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      # ── Run E2E tests ──────────────────────────────────────────────────────
      - name: Run E2E tests (shard ${{ matrix.shard }})
        working-directory: apps/web
        run: pnpm exec playwright test --shard=${{ matrix.shard }}
        env:
          CI: "true"
          AUTH0_SECRET: ""
          NEXT_PUBLIC_API_URL: "http://localhost:8080"

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload test results (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results-${{ strategy.job-index }}
          path: apps/web/test-results/
          retention-days: 7

  # ── Merge sharded HTML reports ─────────────────────────────────────────────
  merge-reports:
    name: Merge Playwright reports
    needs: [e2e]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-*
          merge-multiple: true
          path: all-blob-reports

      - name: Merge HTML reports
        working-directory: apps/web
        run: pnpm exec playwright merge-reports --reporter html ../all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: apps/web/playwright-report/
          retention-days: 30
