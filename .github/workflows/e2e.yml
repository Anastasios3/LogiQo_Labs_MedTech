name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same PR/branch to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (${{ matrix.shard }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    steps:
      # ── Checkout & pnpm setup ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── Install dependencies ───────────────────────────────────────────────
      # postinstall in packages/db runs `prisma generate` automatically.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build the Next.js app ─────────────────────────────────────────────
      # Pre-build so playwright.config.ts can serve with `next start` (faster
      # start-up than `next dev`, and production-realistic for E2E).
      - name: Build Next.js app
        working-directory: apps/web
        run: pnpm build
        env:
          # Auth0 must be empty so dev-mode bypass activates at runtime
          AUTH0_SECRET: ""
          NEXT_PUBLIC_API_URL: "http://localhost:8080"
          AUTH0_BASE_URL: "http://localhost:3000"
          AUTH0_ISSUER_BASE_URL: "https://placeholder.auth0.com"
          AUTH0_CLIENT_ID: "placeholder"
          AUTH0_CLIENT_SECRET: "placeholder"
          AUTH0_AUDIENCE: "https://api.logiqo.io"

      # ── Install Playwright browsers ────────────────────────────────────────
      # Only Chromium in CI — playwright.config.ts filters to chromium when CI=true.
      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      # ── Run E2E tests ──────────────────────────────────────────────────────
      - name: Run E2E tests (shard ${{ matrix.shard }})
        working-directory: apps/web
        run: pnpm exec playwright test --shard=${{ matrix.shard }}
        env:
          CI: "true"
          AUTH0_SECRET: ""
          NEXT_PUBLIC_API_URL: "http://localhost:8080"
          AUTH0_BASE_URL: "http://localhost:3000"
          AUTH0_ISSUER_BASE_URL: "https://placeholder.auth0.com"
          AUTH0_CLIENT_ID: "placeholder"
          AUTH0_CLIENT_SECRET: "placeholder"
          AUTH0_AUDIENCE: "https://api.logiqo.io"

      # ── Upload artifacts ───────────────────────────────────────────────────
      # Blob reporter writes per-shard data to blob-report/; the merge-reports
      # job reassembles them into a single HTML report.
      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ strategy.job-index }}
          path: apps/web/blob-report/
          retention-days: 3

      # Traces, screenshots, and videos for failing tests land in test-results/.
      - name: Upload test results (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results-${{ strategy.job-index }}
          path: apps/web/test-results/
          retention-days: 7

  # ── Merge sharded blob reports into a single HTML report ───────────────────
  merge-reports:
    name: Merge Playwright reports
    needs: [e2e]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all blob report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          merge-multiple: true
          path: all-blob-reports

      - name: Merge into HTML report
        working-directory: apps/web
        run: pnpm exec playwright merge-reports --reporter html ../all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: apps/web/playwright-report/
          retention-days: 30
