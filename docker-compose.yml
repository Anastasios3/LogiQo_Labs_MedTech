version: "3.9"

# Local development infrastructure
# ──────────────────────────────────────────────────────────────────────────────
# 1. Copy .env.example → .env and fill in your local passwords
# 2. docker compose up -d
# 3. pnpm dev
#
# Passwords are read from the .env file (gitignored).
# NEVER hardcode credentials here.
# ──────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: logiqo_postgres
    environment:
      POSTGRES_USER: logiqo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: logiqo_medtech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logiqo -d logiqo_medtech"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: logiqo_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenSearch (Phase 2 — comment out for MVP)
  # opensearch:
  #   image: opensearchproject/opensearch:2.13.0
  #   container_name: logiqo_opensearch
  #   environment:
  #     - discovery.type=single-node
