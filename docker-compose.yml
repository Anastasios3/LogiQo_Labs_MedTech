version: "3.9"

# Local development infrastructure
# Run: docker compose up -d
# Then: pnpm dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: logiqo_postgres
    environment:
      POSTGRES_USER: logiqo
      POSTGRES_PASSWORD: localdev_only
      POSTGRES_DB: logiqo_medtech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logiqo -d logiqo_medtech"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: logiqo_redis
    command: redis-server --requirepass localdev_only
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "localdev_only", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenSearch (Phase 2 — comment out if not needed for MVP)
